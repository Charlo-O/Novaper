name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/operator-web

      - name: Build & Package (Windows)
        env:
          ELECTRON: "1"
        run: |
          npx cross-env ELECTRON=1 npm run --prefix apps/operator-web build
          npm run build:electron
          npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: novaper-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/operator-web

      - name: Build & Package (macOS)
        env:
          ELECTRON: "1"
        run: |
          npx cross-env ELECTRON=1 npm run --prefix apps/operator-web build
          npm run build:electron
          npx electron-builder --mac --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: novaper-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/operator-web

      - name: Build & Package (Linux)
        env:
          ELECTRON: "1"
        run: |
          npx cross-env ELECTRON=1 npm run --prefix apps/operator-web build
          npm run build:electron
          npx electron-builder --linux AppImage --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: novaper-linux
          path: |
            dist/*.AppImage
            dist/latest*.yml

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/novaper-windows/*.exe
            dist/novaper-windows/*.blockmap
            dist/novaper-windows/latest*.yml
            dist/novaper-macos/*.dmg
            dist/novaper-macos/*.zip
            dist/novaper-macos/*.blockmap
            dist/novaper-macos/latest*.yml
            dist/novaper-linux/*.AppImage
            dist/novaper-linux/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

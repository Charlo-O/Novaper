name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/operator-web

      - name: Build & Package (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON: "1"
        run: npm run electron:build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaper-windows
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/operator-web

      - name: Build & Package (macOS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON: "1"
        run: |
          npx cross-env ELECTRON=1 npm run --prefix apps/operator-web build
          npm run build:electron
          npx electron-builder --mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaper-macos
          path: |
            dist/*.dmg
            dist/*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/operator-web

      - name: Build & Package (Linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON: "1"
        run: |
          npx cross-env ELECTRON=1 npm run --prefix apps/operator-web build
          npm run build:electron
          npx electron-builder --linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaper-linux
          path: dist/*.AppImage

  publish-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/novaper-windows/*.exe
            dist/novaper-macos/*.dmg
            dist/novaper-macos/*.zip
            dist/novaper-linux/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
